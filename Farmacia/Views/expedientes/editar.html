<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Expediente - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h2 class="mb-3">Editar Expediente</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-6">
                <label class="form-label">Cliente *</label>
                <select class="form-select">
                    <option value="">Seleccione un cliente</option>
                    <option selected>Juan Pérez</option>
                    <option>María López</option>
                    <option>Carlos Mora</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Empleado responsable *</label>
                <select class="form-select">
                    <option value="">Seleccione un empleado</option>
                    <option selected>Dr. García</option>
                    <option>Dr. Ramírez</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Descripción *</label>
                <textarea class="form-control" rows="4">Control de hipertensión</textarea>
            </div>

            <div class="col-md-6">
                <label class="form-label">Fecha de creación</label>
                <input type="text" class="form-control" value="2025-01-10" disabled />
                <div class="form-text">Este campo no es editable.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Última actualización</label>
                <input type="text" class="form-control" value="2025-03-05" disabled />
                <div class="form-text">Se actualiza automáticamente al guardar.</div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar cambios
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <footer class="border-top footer text-muted mt-4">
        <div class="container py-2">
            &copy; 2025 - Farmacia
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
