<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Expediente - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <h2 class="mb-3">Crear Expediente</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-6">
                <label class="form-label">Cliente *</label>
                <select class="form-select">
                    <option value="">Seleccione un cliente</option>
                    <option>Juan Pérez</option>
                    <option>María López</option>
                    <option>Carlos Mora</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Empleado responsable *</label>
                <select class="form-select">
                    <option value="">Seleccione un empleado</option>
                    <option>Dr. García</option>
                    <option>Dr. Ramírez</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Descripción *</label>
                <textarea class="form-control" rows="4" placeholder="Descripción del expediente clínico..."></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>
    <script src="../components/loader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
