<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 800px;">
            <div class="card-header bg-warning py-3">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Información de Cita</h4>
            </div>
            <div class="card-body p-4">
                <form class="row g-3" action="index.html">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">ID Cliente (FK)</label>
                        <input type="text" class="form-control bg-light" value="505" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Asignar Empleado (FK)</label>
                        <select class="form-select">
                            <option value="20" selected>María López (ID: 20)</option>
                            <option value="21">Juan Rivas (ID: 21)</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Servicio</label>
                        <input type="text" class="form-control" value="Inyectables">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha y Hora</label>
                        <input type="datetime-local" class="form-control" value="2026-04-15T10:00">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select border-warning">
                            <option value="Pendiente" selected>Pendiente</option>
                            <option value="Confirmada">Confirmada</option>
                            <option value="Completada">Completada</option>
                            <option value="Cancelada">Cancelada</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Observaciones</label>
                        <textarea class="form-control" rows="3">Paciente requiere aplicación de dosis de refuerzo. Trae su propia ampolleta.</textarea>
                    </div>

                    <div class="col-12 mt-4 d-flex justify-content-end gap-2">
                        <a href="index.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning fw-bold">Actualizar Cita</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
