<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Programar Cita - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Programación Manual de Cita</h4>
            </div>
            <div class="card-body p-4">
                <form class="row g-3" action="index.html">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Cliente (FK Cliente_Id) *</label>
                        <select class="form-select" required>
                            <option value="">Seleccione Cliente...</option>
                            <option value="505">Carlos Pérez (ID: 505)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Empleado Asignado (FK Empleado_Id) *</label>
                        <select class="form-select" required>
                            <option value="">Seleccione Empleado...</option>
                            <option value="20">Farm. María López (ID: 20)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Servicio *</label>
                        <input type="text" class="form-control" placeholder="Ej: Curación menor" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha y Hora *</label>
                        <input type="datetime-local" class="form-control" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Estado Inicial</label>
                        <select class="form-select">
                            <option>Confirmada</option>
                            <option>Pendiente</option>
                        </select>
                    </div>
                    <div class="col-12 mt-4 text-end">
                        <a href="index.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Programar Cita</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
