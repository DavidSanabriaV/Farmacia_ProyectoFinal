<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0 text-center"><i class="bi bi-calendar-plus"></i> Agendar Nueva Cita</h4>
            </div>
            <div class="card-body p-4">
                <form action="mis-citas.html">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Servicio Requerido *</label>
                        <select class="form-select" required>
                            <option value="">Seleccione un servicio</option>
                            <option>Inyectables</option>
                            <option>Toma de Presión</option>
                            <option>Consulta Farmacéutica</option>
                            <option>Prueba de Glucosa</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha y Hora sugerida *</label>
                        <input type="datetime-local" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Observaciones / Motivo</label>
                        <textarea class="form-control" rows="3" placeholder="Cuéntenos brevemente el motivo de su cita..."></textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Confirmar Solicitud</button>
                        <a href="mis-citas.html" class="btn btn-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
