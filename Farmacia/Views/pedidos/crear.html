<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Pedido - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <h2 class="mb-3">🛒 Crear Pedido</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-6">
                <label class="form-label">Cliente *</label>
                <select class="form-select">
                    <option value="">Seleccione un cliente</option>
                    <option value="CLI-001">Juan Pérez</option>
                    <option value="CLI-002">María López</option>
                    <option value="CLI-003">Carlos Ruiz</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Cupón</label>
                <select class="form-select">
                    <option value="">Sin cupón</option>
                    <option value="CUP-005">VERANO5 - 5% descuento</option>
                    <option value="CUP-010">DESCUENTO10 - 10% descuento</option>
                    <option value="CUP-015">PROMO15 - 15% descuento</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Estado *</label>
                <select class="form-select">
                    <option value="">Seleccione un estado</option>
                    <option>Pendiente</option>
                    <option>Completado</option>
                    <option>Cancelado</option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Total (₡) *</label>
                <div class="input-group">
                    <span class="input-group-text">₡</span>
                    <input type="number" class="form-control" placeholder="0" />
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Fecha Creación *</label>
                <input type="date" class="form-control" />
            </div>

            <div class="col-md-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" rows="3" placeholder="Descripción del pedido"></textarea>
            </div>

            <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>

</html>
