<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Producto - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <h2 class="mb-3">Crear Producto</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-8">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" placeholder="Nombre del producto" />
            </div>

            <div class="col-md-4">
                <label class="form-label">Categoría *</label>
                <select class="form-select">
                    <option value="">Seleccione una categoría</option>
                    <option>Antibióticos</option>
                    <option>Analgésicos</option>
                    <option>Antidiabéticos</option>
                    <option>Vitaminas</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Descripción *</label>
                <textarea class="form-control" rows="3" placeholder="Descripción del producto"></textarea>
            </div>

            <div class="col-md-4">
                <label class="form-label">Precio (₡) *</label>
                <div class="input-group">
                    <span class="input-group-text">₡</span>
                    <input type="number" class="form-control" placeholder="0" />
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Marca</label>
                <input type="text" class="form-control" placeholder="Ej: Bayer, Genérico" />
            </div>

            <div class="col-md-4">
                <label class="form-label">URL Imagen</label>
                <input type="text" class="form-control" placeholder="https://..." />
            </div>

            <div class="col-md-6">
                <div class="form-check mt-4">
                    <input type="checkbox" class="form-check-input" id="receta" />
                    <label class="form-check-label" for="receta">Requiere Receta Médica</label>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-check mt-4">
                    <input type="checkbox" class="form-check-input" id="estado" checked />
                    <label class="form-check-label" for="estado">Producto Activo</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>

</html>
