<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Producto - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h2 class="mb-3">Editar Producto</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-8">
                <label class="form-label">Nombre *</label>
                <input type="text" class="form-control" value="Amoxicilina 500mg" />
            </div>

            <div class="col-md-4">
                <label class="form-label">Categoría *</label>
                <select class="form-select">
                    <option value="">Seleccione una categoría</option>
                    <option selected>Antibióticos</option>
                    <option>Analgésicos</option>
                    <option>Antidiabéticos</option>
                    <option>Vitaminas</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Descripción *</label>
                <textarea class="form-control" rows="3">Antibiótico de amplio espectro para infecciones bacterianas.</textarea>
            </div>

            <div class="col-md-4">
                <label class="form-label">Precio (₡) *</label>
                <div class="input-group">
                    <span class="input-group-text">₡</span>
                    <input type="number" class="form-control" value="2500" />
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label">Marca</label>
                <input type="text" class="form-control" value="Genérico" />
            </div>

            <div class="col-md-4">
                <label class="form-label">URL Imagen</label>
                <input type="text" class="form-control" value="https://ejemplo.com/imagen.jpg" />
            </div>

            <div class="col-md-6">
                <div class="form-check mt-4">
                    <input type="checkbox" class="form-check-input" id="receta" checked />
                    <label class="form-check-label" for="receta">Requiere Receta Médica</label>
                </div>
            </div>

            <div class="col-md-6">
                <div class="form-check mt-4">
                    <input type="checkbox" class="form-check-input" id="estado" checked />
                    <label class="form-check-label" for="estado">Producto Activo</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar cambios
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <footer class="border-top footer text-muted mt-4">
        <div class="container py-2">
            &copy; 2025 - Farmacia
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
