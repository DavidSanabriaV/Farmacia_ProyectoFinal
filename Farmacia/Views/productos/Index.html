<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>

    <div id="navbar-placeholder"></div>

    <div class="container">
        <h2 class="mb-3">📦 Gestión de Productos</h2>

        <a href="crear.html" class="btn btn-success mb-3">
            <i class="bi bi-plus-circle"></i> Registrar nuevo producto
        </a>

        <div class="mb-3">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar producto...">
        </div>

        <table class="table table-striped" id="tablaProductos">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Marca</th>
                    <th>Receta</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Amoxicilina 500mg</td>
                    <td>Antibióticos</td>
                    <td>₡2,500.00</td>
                    <td>Genérico</td>
                    <td><span class="badge bg-warning">Sí</span></td>
                    <td><span class="badge bg-success">Activo</span></td>
                    <td>
                        <div class="d-flex flex-wrap gap-1">
                            <a href="detalle.html" class="btn btn-primary btn-sm">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a href="editar.html" class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a href="eliminar.html" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </a>
                            <a href="../carrito/index.html" class="btn btn-success btn-sm">
                                <i class="bi bi-cart-plus"></i>
                            </a>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Ibuprofeno 400mg</td>
                    <td>Analgésicos</td>
                    <td>₡1,200.00</td>
                    <td>Bayer</td>
                    <td><span class="badge bg-secondary">No</span></td>
                    <td><span class="badge bg-success">Activo</span></td>
                    <td>
                        <div class="d-flex flex-wrap gap-1">
                            <a href="detalle.html" class="btn btn-primary btn-sm">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a href="editar.html" class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a href="eliminar.html" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </a>
                            <a href="../carrito/index.html" class="btn btn-success btn-sm">
                                <i class="bi bi-cart-plus"></i>
                            </a>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Metformina 850mg</td>
                    <td>Antidiabéticos</td>
                    <td>₡3,800.00</td>
                    <td>Genérico</td>
                    <td><span class="badge bg-warning">Sí</span></td>
                    <td><span class="badge bg-danger">Inactivo</span></td>
                    <td>
                        <div class="d-flex flex-wrap gap-1">
                            <a href="detalle.html" class="btn btn-primary btn-sm">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a href="editar.html" class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a href="eliminar.html" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </a>
                            <a href="../carrito/index.html" class="btn btn-success btn-sm">
                                <i class="bi bi-cart-plus"></i>
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>

    <script>
        document.getElementById("buscador").addEventListener("keyup", function () {
            let filtro = this.value.toLowerCase();
            let filas = document.querySelectorAll("#tablaProductos tbody tr");

            filas.forEach(fila => {
                let texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        });
    </script>

</body>

</html>
