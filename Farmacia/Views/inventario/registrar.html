<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Inventario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="mb-3">Registrar Producto al Inventario</h2>

<form class="row g-3" action="index.html">

<div class="col-md-6">
<label class="form-label">Producto *</label>
<select class="form-select">
<option>Seleccione producto</option>
<option>Amoxicilina 500mg</option>
<option>Ibuprofeno 400mg</option>
<option>Metformina 850mg</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Número de Lote *</label>
<input type="text" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Cantidad Disponible *</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Cantidad Mínima *</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Proveedor *</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Fecha de Ingreso *</label>
<input type="date" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Fecha de Vencimiento *</label>
<input type="date" class="form-control">
</div>

<div class="col-12">

<button class="btn btn-primary">
<i class="bi bi-save"></i> Guardar
</button>

<a href="index.html" class="btn btn-secondary">
Cancelar
</a>

</div>

</form>

</div>

</body>
</html>
