<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Empleado - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h2 class="mb-3">Editar Empleado</h2>

        <form class="row g-3" action="index.html">

            <div class="col-md-6">
                <label class="form-label">Cédula *</label>
                <input type="text" class="form-control" value="1-1234-5678" />
            </div>

            <div class="col-md-6">
                <label class="form-label">Puesto *</label>
                <input type="text" class="form-control" value="Farmacéutico" />
            </div>

            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="text" class="form-control" value="8888-1111" />
            </div>

            <div class="col-md-6">
                <label class="form-label">Usuario *</label>
                <select class="form-select">
                    <option value="">Seleccione un usuario</option>
                    <option value="1" selected>admin@farmacia.com</option>
                    <option value="2">cajero@farmacia.com</option>
                    <option value="3">bodega@farmacia.com</option>
                </select>
            </div>

            <div class="col-md-12">
                <label class="form-label">Dirección Exacta</label>
                <textarea class="form-control" rows="2">San José, Costa Rica</textarea>
            </div>

            <div class="col-md-12">
                <div class="form-check mt-2">
                    <input type="checkbox" class="form-check-input" id="estado" checked />
                    <label class="form-check-label" for="estado">Empleado Activo</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Guardar cambios
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>
            </div>
        </form>
    </div>

    <footer class="border-top footer text-muted mt-4">
        <div class="container py-2">
            &copy; 2025 - Farmacia
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
