<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Editar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-4">
        <h2>Editar Usuario: juan_admin</h2>
        <form class="row g-3 mt-2" action="index.html">
            <div class="col-md-6">
                <label class="form-label">UserName</label>
                <input type="text" class="form-control" value="juan_admin" />
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="admin@farmacia.com" />
            </div>
            <div class="col-md-6">
                <label class="form-label">Rol Actual</label>
                <select class="form-select">
                    <option value="1" selected>Admin</option>
                    <option value="2">Cliente</option>
                    <option value="3">Personal</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="text" class="form-control" value="8888-1111" />
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-warning">Actualizar Datos</button>
                <a href="index.html" class="btn btn-secondary">Regresar</a>
            </div>
        </form>
    </div>
</body>
</html>
