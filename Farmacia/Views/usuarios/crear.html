<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registrar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
        <div id="navbar-placeholder"></div>
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="h5 mb-0">Registrar Nuevo Usuario</h2>
            </div>
            <div class="card-body">
                <form class="row g-3" action="index.html">
                    <div class="col-md-6">
                        <label class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico </label>
                        <input type="email" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Rol de Usuario</label>
                        <select class="form-select" required>
                            <option value="">Seleccione un rol</option>
                            <option value="1">Admin</option>
                            <option value="2">Cliente</option>
                            <option value="3">Personal</option>
                        </select>
                    </div>
                    <div class="col-md-3 mt-5">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="lockout">
                            <label class="form-check-label" for="lockout">Bloqueo Habilitado</label>
                        </div>
                    </div>
                    <div class="col-md-3 mt-5">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="estado" checked>
                            <label class="form-check-label" for="estado">Usuario Activo</label>
                        </div>
                    </div>
                    <div class="col-12 border-top pt-3">
                        <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                        <a href="index.html" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
