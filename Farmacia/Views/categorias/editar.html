<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Categoría - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div id="navbar-placeholder"></div>

    <main class="py-5">
        <div class="container">

            <h2 class="mb-3">Editar Categoría</h2>

            <form class="row g-3" action="index.html">

                <div class="col-md-12">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control" value="Antibióticos" />
                </div>

                <div class="col-md-12">
                    <label class="form-label">Descripción *</label>
                    <textarea class="form-control"
                        rows="3">Medicamentos para combatir infecciones bacterianas.</textarea>
                </div>

                <div class="col-md-12">
                    <div class="form-check mt-2">
                        <input type="checkbox" class="form-check-input" id="estado" checked />
                        <label class="form-check-label" for="estado">Categoría Activa</label>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Guardar cambios
                    </button>
                    <a href="index.html" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>
            </form>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>

</body>

</html>
