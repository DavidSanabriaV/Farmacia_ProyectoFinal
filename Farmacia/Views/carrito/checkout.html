<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

    <div class="container">
        <h2 class="mb-3">💳 Confirmar Compra</h2>

        <form action="../pedidos/index.html" class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Cliente *</label>
                <select class="form-select">
                    <option>Juan Pérez</option>
                    <option>María López</option>
                    <option>Carlos Ruiz</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Cupón</label>
                <select class="form-select">
                    <option>Sin cupón</option>
                    <option>DESCUENTO10</option>
                    <option>VERANO5</option>
                </select>
            </div>

            <div class="col-12">
                <h5>📋 Resumen del carrito</h5>

                <table class="table table-bordered table-sm">
                    <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Amoxicilina 500mg</td>
                            <td>2</td>
                            <td>₡5,000.00</td>
                        </tr>
                        <tr>
                            <td>Ibuprofeno 400mg</td>
                            <td>1</td>
                            <td>₡3,750.00</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2" class="text-end"><strong>Total:</strong></td>
                            <td><strong>₡8,750.00</strong></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="col-12 mt-3">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle"></i> Confirmar compra
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Volver al carrito
                </a>
            </div>

        </form>
    </div>

    <footer class="border-top footer text-muted mt-4">
        <div class="container py-2">
            &copy; 2025 - Farmacia
        </div>
    </footer>

</body>
</html>
