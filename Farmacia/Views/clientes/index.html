<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Farmacia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <div id="navbar-placeholder"></div>
    <div class="container">

        <h2 class="mb-3">👤 Gestión de Clientes</h2>

        <a href="crear.html" class="btn btn-success mb-3">
            <i class="bi bi-person-plus"></i> Registrar nuevo cliente
        </a>

        <div class="mb-3">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar cliente...">
        </div>

        <table class="table table-striped" id="tablaClientes">

            <thead>
                <tr>
                    <th>Cédula</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Fecha Nacimiento</th>
                    <th>Puntos</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>1-1111-1111</td>
                    <td>8888-1111</td>
                    <td>San José</td>
                    <td>1995-05-10</td>
                    <td>120</td>

                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver
                        </a>

                        <a href="editar.html" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>

                        <a href="eliminar.html" class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>
    <div id="footer-placeholder"></div>

    <script src="../components/loader.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("buscador").addEventListener("keyup", function () {
            let filtro = this.value.toLowerCase();
            let filas = document.querySelectorAll("#tablaClientes tbody tr");

            filas.forEach(fila => {
                let texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        });
    </script>

</body>

</html>
