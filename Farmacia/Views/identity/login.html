<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Farmacia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

<section class="vh-100">
    <div class="container-fluid h-100">
        <div class="row h-100">

            <div class="col-md-6 d-flex align-items-center justify-content-center"
                 style="background-color: #198754;">

                <div class="w-100 px-4" style="max-width: 420px;">
                    <div class="text-center mb-4">
                        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png"
                             alt="Logo Farmacia"
                             style="width: 90px;">
                    </div>

                    <h2 class="fw-bold mb-4 text-white text-center">Iniciar Sesión</h2>

                    <form class="row g-3">

                        <div class="col-12">
                            <label class="form-label fw-bold text-white">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" name="username" class="form-control"
                                       placeholder="Ingrese su username" required />
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold text-white">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" name="password" class="form-control"
                                       placeholder="Ingrese su contraseña" required />
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" />
                                <label class="form-check-label text-white" for="rememberMe">
                                    Recuérdame
                                </label>
                            </div>
                        </div>

                        <div class="col-12">
                            <a href="../Index.html" class="btn btn-light w-100 fw-bold">
                                <i class="bi bi-box-arrow-in-right"></i> Ingresar
                            </a>
                        </div>

                        <div class="col-12 text-center">
                            <a href="accesoDenegado.html" class="fw-bold text-white text-decoration-underline">
                                ¿Olvidaste la cuenta?
                            </a>
                        </div>

                        <div class="col-12 text-center">
                            <span class="text-white">¿No tienes cuenta?</span>
                            <a href="registro.html" class="fw-bold text-white text-decoration-underline">
                                Regístrate aquí
                            </a>
                        </div>

                    </form>
                </div>
            </div>

            <div class="col-md-6 px-0 d-none d-md-block">
                <img src="https://images.pexels.com/photos/15366536/pexels-photo-15366536.jpeg"
                     alt="Farmacia"
                     class="w-100 vh-100"
                     style="object-fit: cover; object-position: center;">
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
