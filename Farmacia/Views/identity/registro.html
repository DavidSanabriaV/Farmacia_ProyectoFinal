<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Farmacia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

<section class="vh-100">
    <div class="container-fluid h-100">
        <div class="row h-100">

            <div class="col-md-6 px-0 d-none d-md-block">
                <img src="https://images.pexels.com/photos/15366536/pexels-photo-15366536.jpeg"
                     alt="Farmacia"
                     class="w-100 vh-100"
                     style="object-fit: cover; object-position: center;">
            </div>

            <div class="col-md-6 d-flex align-items-center justify-content-center"
                 style="background-color: #198754;">

                <div class="w-100 px-4 py-4" style="max-width: 500px;">
                    <div class="text-center mb-4">
                        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png"
                             alt="Logo Farmacia"
                             style="width: 90px;">
                    </div>

                    <h2 class="fw-bold mb-4 text-white text-center">Registro de Usuario</h2>

                    <form class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Username *</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Ingrese el username" required />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Email *</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="Ingrese el correo" required />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Contraseña *</label>
                            <input type="password" name="passwordHash" class="form-control"
                                   placeholder="Ingrese la contraseña" required />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Número de Teléfono *</label>
                            <input type="text" name="phoneNumber" class="form-control"
                                   placeholder="Ingrese el teléfono" required />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Lockout Enabled *</label>
                            <select name="lockoutEnabled" class="form-select" required>
                                <option value="">Seleccione una opción</option>
                                <option value="true">Sí</option>
                                <option value="false">No</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-white">Estado *</label>
                            <select name="estado" class="form-select" required>
                                <option value="">Seleccione un estado</option>
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>

                        <div class="col-12 mt-3">
                            <a href="login.html" class="btn btn-light w-100 fw-bold">
                                <i class="bi bi-person-plus-fill"></i> Registrarse
                            </a>
                        </div>

                        <div class="col-12 text-center mt-2">
                            <a href="login.html" class="text-white text-decoration-underline">
                                ← Volver al login
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
