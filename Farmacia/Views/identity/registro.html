<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MiFarmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Crear Nueva Cuenta</h3>
                        <p class="text-muted small">Registra un nuevo usuario en el sistema</p>
                    </div>

                    <form action="login.html" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">USUARIO</label>
                            <input type="text" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">CORREO ELECTRÓNICO</label>
                            <input type="email" class="form-control" placeholder="ejemplo@farmacia.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">CONTRASEÑA</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">TELÉFONO</label>
                            <input type="text" class="form-control" placeholder="8888-8888" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">BLOQUEO HABILITADO</label>
                            <select class="form-select">
                                <option value="true">Sí</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small">ESTADO INICIAL</label>
                            <select class="form-select">
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                COMPLETAR REGISTRO <i class="bi bi-check-circle ms-2"></i>
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <a href="login.html" class="text-muted small text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
