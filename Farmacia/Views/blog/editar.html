<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a href="blog.html" class="btn btn-link text-decoration-none p-0 text-secondary">
                        <i class="bi bi-arrow-left"></i> Volver al blog
                    </a>
                    <span class="badge bg-warning text-dark">Modo Edición</span>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark py-3 d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-fill"></i> Editar Noticia #782</h4>
                        <button class="btn btn-sm btn-outline-danger border-0" title="Eliminar noticia">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                    
                    <div class="card-body p-4">
                        <form action="blog.html">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Título del Artículo</label>
                                <input type="text" class="form-control" value="5 Consejos para una dieta balanceada" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Categoría</label>
                                    <select class="form-select">
                                        <option selected>Nutrición</option>
                                        <option>Prevención</option>
                                        <option>Salud Mental</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">URL de la Imagen</label>
                                    <input type="text" class="form-control" value="https://images.unsplash.com/photo-1505751172107-573967a4f39a">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Contenido</label>
                                <textarea class="form-control" rows="10">Aprende a combinar tus alimentos para mejorar tu energía diaria. Mantener una alimentación equilibrada no se trata de restricciones, sino de encontrar la armonía entre los nutrientes que tu cuerpo realmente necesita para rendir al máximo...</textarea>
                            </div>

                            <div class="alert alert-secondary small">
                                <i class="bi bi-info-circle"></i> Última modificación: <b>07/04/2026</b> por <b>Admin_Farmacia</b>
                            </div>

                            <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
                                <a href="blog.html" class="btn btn-outline-secondary px-4">Descartar Cambios</a>
                                <button type="submit" class="btn btn-warning px-5 fw-bold">Actualizar Contenido</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
