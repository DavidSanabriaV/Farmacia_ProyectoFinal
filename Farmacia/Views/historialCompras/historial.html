<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Compras - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <h2 class="mb-3">🛒 Historial de Compras</h2>

        <div class="card mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Fecha inicio</label>
                        <input type="date" id="fechaInicio" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Fecha fin</label>
                        <input type="date" id="fechaFin" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Estado</label>
                        <select id="filtroEstado" class="form-select">
                            <option value="">Todos</option>
                            <option value="Completado">Completado</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="filtrar()">
                            <i class="bi bi-search"></i> Filtrar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <table class="table table-striped" id="tablaHistorial">
            <thead>
                <tr>
                    <th>#Pedido</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Cupón</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><span class="text-muted">1001</span></td>
                    <td>2025-01-15</td>
                    <td>₡15,500.00</td>
                    <td><span class="badge bg-success">Completado</span></td>
                    <td><span class="text-muted">—</span></td>
                    <td>
                        <a href="detalle_compra.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                        <a href="estado_pedido.html" class="btn btn-secondary btn-sm">
                            <i class="bi bi-truck"></i> Estado
                        </a>
                    </td>
                </tr>
                <tr>
                    <td><span class="text-muted">1002</span></td>
                    <td>2025-02-03</td>
                    <td>₡8,200.00</td>
                    <td><span class="badge bg-warning text-dark">Pendiente</span></td>
                    <td>DESC10</td>
                    <td>
                        <a href="detalle_compra.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                        <a href="estado_pedido.html" class="btn btn-secondary btn-sm">
                            <i class="bi bi-truck"></i> Estado
                        </a>
                    </td>
                </tr>
                <tr>
                    <td><span class="text-muted">1003</span></td>
                    <td>2025-03-20</td>
                    <td>₡22,000.00</td>
                    <td><span class="badge bg-danger">Cancelado</span></td>
                    <td><span class="text-muted">—</span></td>
                    <td>
                        <a href="detalle_compra.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                        <a href="estado_pedido.html" class="btn btn-secondary btn-sm">
                            <i class="bi bi-truck"></i> Estado
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="footer-placeholder"></div>
    <script src="../components/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filtrar() {
            const inicio = document.getElementById("fechaInicio").value;
            const fin = document.getElementById("fechaFin").value;
            const estado = document.getElementById("filtroEstado").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaHistorial tbody tr");

            filas.forEach(fila => {
                const fecha = fila.cells[1].textContent.trim();
                const estadoFila = fila.cells[3].textContent.trim().toLowerCase();
                let mostrar = true;
                if (inicio && fecha < inicio) mostrar = false;
                if (fin && fecha > fin) mostrar = false;
                if (estado && !estadoFila.includes(estado)) mostrar = false;
                fila.style.display = mostrar ? "" : "none";
            });
        }
    </script>
</body>

</html>
