<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facturas - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body>

    <div class="container">
        <h2 class="mb-3">🧾 Gestión de Facturas</h2>

        <!-- Botón de historial -->
        <a href="historial.html" class="btn btn-info mb-3">
            <i class="bi bi-clock-history"></i> Ver historial de mis facturas
        </a>

        <!-- Barra de búsqueda -->
        <div class="mb-3">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar factura...">
        </div>

        <!-- Tabla de facturas -->
        <table class="table table-striped" id="tablaFacturas">
            <thead>
                <tr>
                    <th>Factura</th>
                    <th>Cliente</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#F-1001</td>
                    <td>Juan Pérez</td>
                    <td>2025-06-10</td>
                    <td>₡8,750.00</td>
                    <td><span class="badge bg-success">Pagada</span></td>
                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>#F-1002</td>
                    <td>María López</td>
                    <td>2025-06-11</td>
                    <td>₡12,500.00</td>
                    <td><span class="badge bg-warning">Pendiente</span></td>
                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>#F-1003</td>
                    <td>Carlos Ruiz</td>
                    <td>2025-06-12</td>
                    <td>₡5,000.00</td>
                    <td><span class="badge bg-danger">Cancelada</span></td>
                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver detalle
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Footer -->
    <footer class="border-top footer text-muted mt-4">
        <div class="container py-2">
            &copy; 2025 - Farmacia
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script de búsqueda -->
    <script>
        document.getElementById("buscador").addEventListener("keyup", function () {
            let filtro = this.value.toLowerCase();
            let filas = document.querySelectorAll("#tablaFacturas tbody tr");
            filas.forEach(fila => {
                let texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? "" : "none";
            });
        });
    </script>

</body>
</html>
