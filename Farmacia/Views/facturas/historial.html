<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Facturas - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2 class="mb-3">🧾 Mis Facturas</h2>

    <div class="mb-3">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar factura...">
    </div>

    <table class="table table-striped" id="tablaFacturas">
        <thead>
            <tr>
                <th>Factura #</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#F-1001</td>
                <td>2025-06-10</td>
                <td>₡8,750.00</td>
                <td><span class="badge bg-success">Pagada</span></td>
                <td>
                    <a href="detalle.html" class="btn btn-primary btn-sm">
                        Ver
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
document.getElementById("buscador").addEventListener("keyup", function () {
    let filtro = this.value.toLowerCase();
    document.querySelectorAll("#tablaFacturas tbody tr").forEach(fila => {
        fila.style.display = fila.textContent.toLowerCase().includes(filtro) ? "" : "none";
    });
});
</script>

</body>
</html>
