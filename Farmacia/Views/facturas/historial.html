<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Facturas - Farmacia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <h2 class="mb-3">🧾 Mis Facturas</h2>

        <div class="mb-3 d-flex gap-2">
            <a href="index.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver a gestión
            </a>
        </div>

        <div class="mb-3">
            <input type="text" id="buscador" class="form-control" placeholder="Buscar factura...">
        </div>

        <table class="table table-striped" id="tablaFacturas">
            <thead>
                <tr>
                    <th>Factura #</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#F-1001</td>
                    <td>2025-06-10</td>
                    <td>₡8,750.00</td>
                    <td><span class="badge bg-success">Pagada</span></td>
                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                    </td>
                </tr>
                <tr>
                    <td>#F-1002</td>
                    <td>2025-06-11</td>
                    <td>₡12,500.00</td>
                    <td><span class="badge bg-warning">Pendiente</span></td>
                    <td>
                        <a href="detalle.html" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> Ver
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>

    <script>
        document.getElementById("buscador").addEventListener("keyup", function () {
            let filtro = this.value.toLowerCase();
            document.querySelectorAll("#tablaFacturas tbody tr").forEach(fila => {
                fila.style.display = fila.textContent.toLowerCase().includes(filtro) ? "" : "none";
            });
        });
    </script>
</body>

</html>
