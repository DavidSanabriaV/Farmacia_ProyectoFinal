<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar Tratamiento</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
<div id="navbar-placeholder"></div>

<div class="container mt-4">

<h2 class="mb-4">💊 Registrar Tratamiento</h2>

<form class="row g-3" action="mis_tratamientos.html">

<div class="col-md-6">
<label class="form-label">Medicamento *</label>
<select class="form-select">
<option>Seleccione medicamento</option>
<option>Amoxicilina 500mg</option>
<option>Ibuprofeno 400mg</option>
<option>Metformina 850mg</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Dosis *</label>
<input type="text" class="form-control" placeholder="Ej: 1 tableta">
</div>

<div class="col-md-6">
<label class="form-label">Frecuencia *</label>
<select class="form-select">
<option>Seleccione frecuencia</option>
<option>Cada 8 horas</option>
<option>Cada 12 horas</option>
<option>Una vez al día</option>
<option>Dos veces al día</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Fecha inicio *</label>
<input type="date" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Fecha fin</label>
<input type="date" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Horarios de toma *</label>
<input type="time" class="form-control mb-2" id="horario1">
<button type="button" class="btn btn-outline-secondary btn-sm" onclick="agregarHorario()">
<i class="bi bi-plus-circle"></i> Agregar otro horario
</button>
<div id="horariosExtra"></div>
</div>

<div class="col-md-6">
<label class="form-label">Indicaciones del médico</label>
<textarea class="form-control" rows="3" placeholder="Ej: Tomar con alimentos..."></textarea>
</div>

<div class="col-12">
<button type="submit" class="btn btn-primary">
<i class="bi bi-save"></i> Guardar tratamiento
</button>
<a href="mis_tratamientos.html" class="btn btn-secondary">
Cancelar
</a>
</div>

</form>

</div>
<div id="footer-placeholder"></div>
<script src="../components/loader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function agregarHorario() {
  const div = document.getElementById("horariosExtra");
  const input = document.createElement("input");
  input.type = "time";
  input.className = "form-control mt-2";
  div.appendChild(input);
}
</script>

</body>
</html>
