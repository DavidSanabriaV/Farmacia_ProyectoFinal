<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cupones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-ticket-perforated"></i> Panel de Cupones (Admin)</h2>
            <div class="d-flex gap-2">
                <a href="cliente.html" class="btn btn-outline-primary">
                    <i class="bi bi-person-badge"></i> Ver como Cliente
                </a>
                <a href="crear.html" class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Nuevo Cupón
                </a>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar cupón...">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Descripción</th>
                                <th>Valor</th>
                                <th>Expiración</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>101</td>
                                <td><strong>PROMO-VERANO</strong><br><small class="text-muted">Descuento de temporada</small></td>
                                <td>15%</td>
                                <td>30/06/2026</td>
                                <td><span class="badge bg-success">Activo</span></td>
                                <td>
                                    <a href="editar.html" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                                    <a href="eliminar.html" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
