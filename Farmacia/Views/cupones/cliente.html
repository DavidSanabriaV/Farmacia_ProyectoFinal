<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Beneficios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-primary mb-4"><i class="bi bi-gift"></i> Mis Cupones Disponibles</h2>

        <div class="card mb-5 border-primary bg-light">
            <div class="card-body">
                <h5 class="fw-bold">¿Tienes un código?</h5>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Escribe el código aquí (Ej: SALUD2026)">
                    <button class="btn btn-primary px-4" type="button">Aplicar Cupón</button>
                </div>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 g-4">
            <div class="col">
                <div class="card coupon-card h-100 p-3 shadow-sm">
                    <div class="row g-0 align-items-center">
                        <div class="col-4 text-center border-end">
                            <h3 class="fw-bold text-primary mb-0">15%</h3>
                            <small class="text-uppercase">OFF</small>
                        </div>
                        <div class="col-8 ps-3">
                            <h6 class="fw-bold">Descuento Invierno</h6>
                            <p class="small text-muted mb-2">Vence: 30 de Junio</p>
                            <button class="btn btn-sm btn-primary w-100">Canjear ahora</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
