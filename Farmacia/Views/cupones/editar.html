<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cupón</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
        <div class="card shadow-sm border-warning">
            <div class="card-body">
                <h3 class="card-title text-warning mb-4">Modificar Cupón #101</h3>
                <form class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" value="PROMO-2026 - Descuento Invierno">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Estado Actual</label>
                        <select class="form-select border-warning">
                            <option selected>Activo</option>
                            <option>Inactivo / Expirado</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Valor del Descuento</label>
                        <div class="input-group">
                            <input type="number" class="form-control" value="15">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nueva Fecha Expiración</label>
                        <input type="date" class="form-control" value="2026-06-30">
                    </div>
                    <div class="col-12 mt-4 text-center">
                        <hr>
                        <button type="submit" class="btn btn-warning">Aplicar Cambios</button>
                        <a href="index.html" class="btn btn-outline-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../components/loader.js"></script>
</body>
</html>
